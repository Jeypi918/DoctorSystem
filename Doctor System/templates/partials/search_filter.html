<form method="GET" class="search-filter-bar mb-8 p-6 bg-white rounded-2xl shadow-lg border">
  <div class="flex flex-wrap items-end gap-4">

    <!-- Search -->
    <div class="flex-1 min-w-[250px]">
      <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
      <div class="relative">
        <input
          type="search"
          name="q"
          value="{{ request.GET.q|default:'' }}"
          class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy-500 focus:border-transparent shadow-sm"
placeholder="Search"
        >
        <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>

    <!-- Date From -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Date From</label>
      <input
        type="date"
        name="date_from"
        value="{{ request.GET.date_from|default:'' }}"
        class="px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy-500"
      >
    </div>

    <!-- Date To -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Date To</label>
      <input
        type="date"
        name="date_to"
        value="{{ request.GET.date_to|default:'' }}"
        class="px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-navy-500"
      >
    </div>

    <!-- Filter Button -->
    <div>
      <label class="block text-sm font-medium text-transparent mb-2">.</label>
      <button
        type="submit"
        class="bg-navy-500 hover:bg-navy-600 text-white px-8 py-3.5 rounded-xl
         font-semibold shadow-lg flex items-center gap-2
         text-base"
>
  <i class="fa fa-search text-sm"></i>
  Filter
</button>
    </div>

  </div>
</form>
